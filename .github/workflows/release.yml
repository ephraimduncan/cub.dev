name: release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.3.0). Created if missing."
        required: true

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macos-arm64
            os: macos-14
            target: aarch64-apple-darwin
            bundles: dmg,app
          - label: macos-intel
            os: macos-13
            target: x86_64-apple-darwin
            bundles: dmg,app
          - label: linux-x64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: deb,appimage,rpm
    steps:
      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.label }}

      - name: Install Linux build deps
        if: matrix.label == 'linux-x64'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            patchelf \
            file

      - name: Install frontend deps
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run tauri build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Stage + hash artifacts
        id: artifacts
        shell: bash
        run: |
          set -euo pipefail
          BUNDLE_DIR=src-tauri/target/${{ matrix.target }}/release/bundle
          shopt -s nullglob
          # Tauri's filename conventions differ across targets; collect by
          # bundle-format directory rather than hardcoding names.
          mapfile -t SRC < <(
            ls "$BUNDLE_DIR"/dmg/*.dmg \
               "$BUNDLE_DIR"/deb/*.deb \
               "$BUNDLE_DIR"/appimage/*.AppImage \
               "$BUNDLE_DIR"/rpm/*.rpm 2>/dev/null || true
          )
          if [ ${#SRC[@]} -eq 0 ]; then
            echo "::error::no bundles found under $BUNDLE_DIR"
            ls -R "$BUNDLE_DIR" || true
            exit 1
          fi
          : > files.txt
          for path in "${SRC[@]}"; do
            base=$(basename "$path")
            cp "$path" "$base"
            sha=$(shasum -a 256 "$base" | awk '{print $1}')
            echo "::notice title=${base} SHA256::${sha}"
            echo "$base  $sha" >> files.txt
            echo "$base" >> upload_list.txt
          done
          {
            echo "files<<EOF"
            cat upload_list.txt
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Cub ${{ steps.tag.outputs.tag }}
          draft: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: ${{ steps.artifacts.outputs.files }}
